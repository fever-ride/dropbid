server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true   # JVM 21 Project Loom
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dropbid}
    username: ${SPRING_DATASOURCE_USERNAME:dropbid}
    password: ${SPRING_DATASOURCE_PASSWORD:dropbid}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
