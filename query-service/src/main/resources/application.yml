server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: query-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dropbid}
    username: ${SPRING_DATASOURCE_USERNAME:dropbid}
    password: ${SPRING_DATASOURCE_PASSWORD:dropbid}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
    table: query_flyway_history
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}

sync:
  user-service-url: ${SYNC_USER_SERVICE_URL:http://localhost:8082}
  shop-service-url: ${SYNC_SHOP_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
