server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: shop-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dropbid}
    username: ${SPRING_DATASOURCE_USERNAME:dropbid}
    password: ${SPRING_DATASOURCE_PASSWORD:dropbid}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
