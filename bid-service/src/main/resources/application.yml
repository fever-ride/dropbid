server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: bid-service
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}

aws:
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
  region: ${AWS_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
