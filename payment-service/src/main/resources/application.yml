server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dropbid}
    username: ${SPRING_DATASOURCE_USERNAME:dropbid}
    password: ${SPRING_DATASOURCE_PASSWORD:dropbid}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}

payment:
  consumer:
    num-workers: 10
    reclaim-interval-ms: 30000
    pending-timeout-ms: 30000
  recovery:
    interval-ms: 120000      # 2 minutes
    stuck-threshold-minutes: 5
    max-retries: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
